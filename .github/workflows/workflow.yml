name: Publish to GitHub Packages

# Pushing a tag like v1.2.3 packs Roslynk at that version and publishes it to this repository's
# GitHub Packages NuGet feed, after the full test suite passes.
# Consumers add the feed:
#   https://nuget.pkg.github.com/OWNER/index.json
# and authenticate with a PAT (read:packages) or GITHUB_TOKEN that can read packages from this private repo.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Test
        run: dotnet test Source/Morris.Roslynk.slnx --configuration Release

      - name: Pack
        run: >
          dotnet pack Source/App/Morris.Roslynk.Mcp/Morris.Roslynk.Mcp.csproj
          --configuration Release
          -p:Version=$VERSION
          --output ./nupkgs

      - name: Add GitHub Packages source
        run: >
          dotnet nuget add source
          "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --name github
          --username ${{ github.actor }}
          --password ${{ secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text

      - name: Push
        run: >
          dotnet nuget push ./nupkgs/*.nupkg
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --skip-duplicate
