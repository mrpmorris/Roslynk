Publisher: Air Software Ltd
PackageName: Roslynk
PackageUrl: https://github.com/AirSoftwareLtd/Roslynk
License: Proprietary
ShortDescription: C# semantic intelligence MCP server for Claude, powered by Roslyn.
Description: >-
  Roslynk is a Windows service exposing a Model Context Protocol (MCP) server that gives Claude
  semantic intelligence over the C# in a loaded solution — diagnostics, symbol navigation,
  find-references, semantic rename, change-signature, dead-code analysis, and content-anchored
  patching, all driven by Roslyn. It listens on loopback only.
